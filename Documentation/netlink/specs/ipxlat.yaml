---
name: ipxlat
protocol: genetlink
doc: Netlink protocol to control IPXLAT (SIIT) network devices.

definitions:
  -
    type: const
    name: pool6-max-prefix-len
    value: 128
    doc: Maximum allowed length for the pool6 prefix.

attribute-sets:
  -
    name: pool
    attributes:
      -
        name: prefix
        type: binary
        checks:
          exact-len: 16
      -
        name: prefix-len
        type: u8
        checks:
          max: pool6-max-prefix-len
  -
    name: cfg
    attributes:
      -
        name: pool6
        type: nest
        doc: IPv6 pool.
        nested-attributes: pool
      -
        name: pool6791v6
        type: binary
        checks:
          exact-len: 16
      -
        name: pool6791v4
        type: u32
        byte-order: big-endian
        display-hint: ipv4
      -
        name: lowest-ipv6-mtu
        type: u32
        checks:
          min: 1280
      -
        name: compute-udp-csum-zero
        type: u8
        checks:
          max: 1
  -
    name: dev
    attributes:
      -
        name: ifindex
        type: u32
        doc: Index of the ipxlat interface to operate on.
      -
        name: netnsid
        type: s32
        doc: ID of the netns the device lives in.
      -
        name: config
        type: nest
        doc: Ipxlat device configuration.
        nested-attributes: cfg

operations:
  list:
    -
      name: dev-get
      attribute-set: dev
      doc: Get / dump configuration of ipxlat devices.
      do:
        pre: ipxlat-nl-pre-doit
        post: ipxlat-nl-post-doit
        request:
          attributes:
            - ifindex
        reply:  &dev-all
          attributes:
            - ifindex
            - netnsid
            - config
      dump:
        reply: *dev-all

    -
      name: dev-set
      doc: Set configuration of an ipxlat device.
      attribute-set: dev
      flags: [admin-perm]
      do:
        request:
          attributes:
            - ifindex
            - config
        reply:
          attributes: []
        pre:  ipxlat-nl-pre-doit
        post: ipxlat-nl-post-doit

mcast-groups:
  list:
    -
      name: mgmt
